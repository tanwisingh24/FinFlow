<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinFlow — Smart Financial Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #181d2e;
    --border: rgba(255,255,255,0.07);
    --accent: #4fffb0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --accent4: #74b9ff;
    --text: #e8eaf0;
    --muted: #5a6080;
    --income-glow: rgba(79,255,176,0.15);
    --expense-glow: rgba(255,107,107,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: #0a0d14;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(79,255,176,0.4);
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .date-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  @media (max-width: 640px) { .summary-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card.balance::before { background: radial-gradient(circle at 80% 20%, rgba(116,185,255,0.08), transparent 60%); }
  .card.income::before  { background: radial-gradient(circle at 80% 20%, var(--income-glow), transparent 60%); }
  .card.expense::before { background: radial-gradient(circle at 80% 20%, var(--expense-glow), transparent 60%); }
  .card:hover::before { opacity: 1; }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  .card.balance .dot { background: var(--accent4); box-shadow: 0 0 6px var(--accent4); }
  .card.income  .dot { background: var(--accent);  box-shadow: 0 0 6px var(--accent); }
  .card.expense .dot { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  .card-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    letter-spacing: -1px;
    line-height: 1;
  }

  .card.balance  .card-amount { color: var(--accent4); }
  .card.income   .card-amount { color: var(--accent); }
  .card.expense  .card-amount { color: var(--accent2); }

  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* BUDGET BAR */
  .budget-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .budget-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .budget-row:last-child { margin-bottom: 0; }

  .budget-label {
    font-size: 13px;
    width: 100px;
    flex-shrink: 0;
    color: var(--text);
  }

  .budget-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .budget-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .budget-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: 38px;
    text-align: right;
    flex-shrink: 0;
  }

  /* MAIN LAYOUT */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
  }

  @media (max-width: 820px) { .main-grid { grid-template-columns: 1fr; } }

  /* FORM */
  .form-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
  }

  .form-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    margin-bottom: 24px;
  }

  .tabs {
    display: flex;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
  }

  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active-income { background: var(--income-glow); color: var(--accent); border: 1px solid rgba(79,255,176,0.3); }
  .tab.active-expense { background: var(--expense-glow); color: var(--accent2); border: 1px solid rgba(255,107,107,0.3); }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 7px;
  }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,255,176,0.1);
  }

  select option { background: var(--surface2); }

  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-add {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-add.income-mode {
    background: var(--accent);
    color: #0a0d14;
    box-shadow: 0 4px 20px rgba(79,255,176,0.3);
  }

  .btn-add.income-mode:hover { box-shadow: 0 6px 28px rgba(79,255,176,0.5); transform: translateY(-1px); }

  .btn-add.expense-mode {
    background: var(--accent2);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,107,107,0.3);
  }

  .btn-add.expense-mode:hover { box-shadow: 0 6px 28px rgba(255,107,107,0.5); transform: translateY(-1px); }

  /* TRANSACTIONS */
  .tx-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .tx-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .tx-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
  }

  .filter-select {
    width: auto;
    padding: 7px 12px;
    font-size: 12px;
    border-radius: 8px;
  }

  .tx-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 480px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  .tx-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    animation: slideIn 0.3s ease;
    transition: background 0.2s;
  }

  .tx-item:hover { background: #1e2438; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .tx-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .tx-icon.income  { background: var(--income-glow); }
  .tx-icon.expense { background: var(--expense-glow); }

  .tx-info { flex: 1; min-width: 0; }

  .tx-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tx-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }

  .tx-cat-badge {
    background: var(--surface);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 500;
    text-transform: capitalize;
  }

  .tx-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .tx-amount.income  { color: var(--accent); }
  .tx-amount.expense { color: var(--accent2); }

  .tx-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }

  .tx-del:hover { color: var(--accent2); background: var(--expense-glow); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  /* CHART */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-top: 24px;
  }

  .chart-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: center;
    margin-top: 20px;
  }

  @media (max-width: 640px) { .chart-wrap { grid-template-columns: 1fr; } }

  canvas#pieChart {
    max-width: 200px;
    max-height: 200px;
    justify-self: center;
  }

  .chart-legend { display: flex; flex-direction: column; gap: 10px; }

  .legend-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }

  .legend-left { display: flex; align-items: center; gap: 8px; }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-amt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* SAVINGS GOAL */
  .goal-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-top: 24px;
  }

  .goal-bar-wrap {
    height: 14px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    margin: 16px 0 8px;
  }

  .goal-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), #00c2ff);
    box-shadow: 0 0 12px rgba(79,255,176,0.4);
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .goal-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
  }

  .goal-meta span:first-child { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }

  .goal-input-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .goal-input-row input { flex: 1; }

  .btn-set {
    padding: 10px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .btn-set:hover { border-color: var(--accent); color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 20px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(79,255,176,0.4); }
  .toast.error   { border-color: rgba(255,107,107,0.4); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark">₹</div>
      <div class="logo-text">Fin<span>Flow</span></div>
    </div>
    <div class="date-chip" id="dateChip">Loading...</div>
  </header>

  <!-- SUMMARY CARDS -->
  <div class="summary-grid">
    <div class="card balance">
      <div class="card-label"><span class="dot"></span>Net Balance</div>
      <div class="card-amount" id="balanceAmt">₹0</div>
      <div class="card-sub" id="balanceSub">No transactions yet</div>
    </div>
    <div class="card income">
      <div class="card-label"><span class="dot"></span>Total Income</div>
      <div class="card-amount" id="incomeAmt">₹0</div>
      <div class="card-sub" id="incomeSub">0 transactions</div>
    </div>
    <div class="card expense">
      <div class="card-label"><span class="dot"></span>Total Expenses</div>
      <div class="card-amount" id="expenseAmt">₹0</div>
      <div class="card-sub" id="expenseSub">0 transactions</div>
    </div>
  </div>

  <!-- BUDGET TRACKER -->
  <div class="budget-section">
    <div class="section-title">Monthly Budget Overview</div>
    <div id="budgetBars"></div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- FORM -->
    <div class="form-panel">
      <div class="form-title">Add Transaction</div>

      <div class="tabs">
        <button class="tab active-income" id="tabIncome" onclick="setMode('income')">📈 Income</button>
        <button class="tab" id="tabExpense" onclick="setMode('expense')">📉 Expense</button>
      </div>

      <div class="field">
        <label>Description</label>
        <input type="text" id="txDesc" placeholder="e.g. Salary, Grocery...">
      </div>

      <div class="input-row">
        <div class="field">
          <label>Amount (₹)</label>
          <input type="number" id="txAmount" placeholder="0.00" min="0">
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="txDate">
        </div>
      </div>

      <div class="field">
        <label>Category</label>
        <select id="txCat">
          <option value="">— Select category —</option>
        </select>
      </div>

      <button class="btn-add income-mode" id="addBtn" onclick="addTransaction()">+ Add Income</button>
    </div>

    <!-- TRANSACTIONS -->
    <div class="tx-panel">
      <div class="tx-header">
        <div class="tx-title">Transactions</div>
        <select class="filter-select" id="filterCat" onchange="renderTransactions()">
          <option value="all">All</option>
        </select>
      </div>
      <div class="tx-list" id="txList"></div>
    </div>
  </div>

  <!-- CHART + SAVINGS -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:0">

    <div class="chart-section">
      <div class="section-title">Spending by Category</div>
      <div class="chart-wrap">
        <canvas id="pieChart" width="200" height="200"></canvas>
        <div class="chart-legend" id="chartLegend"></div>
      </div>
    </div>

    <div class="goal-section">
      <div class="section-title">Savings Goal</div>
      <div style="font-family:'DM Serif Display',serif; font-size:20px; margin-top:4px">
        Track your target 🎯
      </div>
      <div class="goal-bar-wrap">
        <div class="goal-bar-fill" id="goalFill" style="width:0%"></div>
      </div>
      <div class="goal-meta">
        <span id="goalSaved">₹0 saved</span>
        <span id="goalTarget">Goal: ₹0</span>
      </div>
      <div class="goal-input-row">
        <input type="number" id="goalInput" placeholder="Set goal amount...">
        <button class="btn-set" onclick="setGoal()">Set Goal</button>
      </div>
    </div>

  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg">Transaction added</span>
</div>

<script>
// ────────── DATA ──────────
const INCOME_CATS  = ['Salary','Freelance','Investment','Gift','Bonus','Other Income'];
const EXPENSE_CATS = ['Food','Transport','Shopping','Rent','Utilities','Entertainment','Health','Education','Other'];

const CAT_ICONS = {
  Salary:'💰', Freelance:'💻', Investment:'📈', Gift:'🎁', Bonus:'⭐', 'Other Income':'🪙',
  Food:'🍛', Transport:'🚌', Shopping:'🛍️', Rent:'🏠', Utilities:'⚡',
  Entertainment:'🎮', Health:'💊', Education:'📚', Other:'📦'
};

const CAT_COLORS = [
  '#4fffb0','#ff6b6b','#ffd166','#74b9ff','#a29bfe',
  '#fd79a8','#00cec9','#e17055','#6c5ce7','#55efc4',
  '#fdcb6e','#0984e3','#b2bec3','#2d3436','#fab1a0'
];

let transactions = JSON.parse(localStorage.getItem('finflow_tx') || '[]');
let savingsGoal  = parseFloat(localStorage.getItem('finflow_goal') || '0');
let mode = 'income';

// ────────── INIT ──────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('dateChip').textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
  populateCats();
  renderAll();
});

function save() {
  localStorage.setItem('finflow_tx', JSON.stringify(transactions));
}

// ────────── MODE ──────────
function setMode(m) {
  mode = m;
  document.getElementById('tabIncome').className  = 'tab' + (m==='income'  ? ' active-income'  : '');
  document.getElementById('tabExpense').className = 'tab' + (m==='expense' ? ' active-expense' : '');
  document.getElementById('addBtn').textContent   = m==='income' ? '+ Add Income' : '+ Add Expense';
  document.getElementById('addBtn').className     = 'btn-add ' + (m==='income' ? 'income-mode' : 'expense-mode');
  populateCats();
}

function populateCats() {
  const cats = mode==='income' ? INCOME_CATS : EXPENSE_CATS;
  const sel  = document.getElementById('txCat');
  sel.innerHTML = '<option value="">— Select category —</option>';
  cats.forEach(c => sel.innerHTML += `<option value="${c}">${CAT_ICONS[c]||''} ${c}</option>`);
}

// ────────── ADD ──────────
function addTransaction() {
  const desc   = document.getElementById('txDesc').value.trim();
  const amount = parseFloat(document.getElementById('txAmount').value);
  const date   = document.getElementById('txDate').value;
  const cat    = document.getElementById('txCat').value;

  if (!desc)   { toast('Enter a description','error'); return; }
  if (!amount || amount<=0) { toast('Enter a valid amount','error'); return; }
  if (!date)   { toast('Select a date','error'); return; }
  if (!cat)    { toast('Select a category','error'); return; }

  transactions.unshift({ id: Date.now(), type: mode, desc, amount, date, cat });
  save();
  renderAll();
  toast(mode==='income' ? '✅ Income added!' : '✅ Expense added!', 'success');

  document.getElementById('txDesc').value   = '';
  document.getElementById('txAmount').value = '';
  document.getElementById('txCat').value    = '';
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  save();
  renderAll();
  toast('🗑️ Deleted','success');
}

// ────────── RENDER ALL ──────────
function renderAll() {
  renderSummary();
  renderTransactions();
  renderBudget();
  renderChart();
  renderGoal();
  updateFilter();
}

// SUMMARY
function renderSummary() {
  const income  = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  const ic = transactions.filter(t=>t.type==='income').length;
  const ec = transactions.filter(t=>t.type==='expense').length;

  document.getElementById('balanceAmt').textContent = fmt(balance);
  document.getElementById('incomeAmt').textContent  = fmt(income);
  document.getElementById('expenseAmt').textContent = fmt(expense);
  document.getElementById('incomeSub').textContent  = `${ic} transaction${ic!==1?'s':''}`;
  document.getElementById('expenseSub').textContent = `${ec} transaction${ec!==1?'s':''}`;
  document.getElementById('balanceSub').textContent = balance>0 ? '↑ Positive balance' : balance<0 ? '↓ Deficit' : 'Break even';
}

// TRANSACTIONS
function renderTransactions() {
  const filter = document.getElementById('filterCat')?.value || 'all';
  const list = document.getElementById('txList');
  let data = transactions;
  if (filter !== 'all') data = data.filter(t => t.cat === filter || t.type === filter);

  if (!data.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">💸</div><div class="empty-text">No transactions yet.<br>Add one above!</div></div>`;
    return;
  }

  list.innerHTML = data.map(t => `
    <div class="tx-item">
      <div class="tx-icon ${t.type}">${CAT_ICONS[t.cat]||'💱'}</div>
      <div class="tx-info">
        <div class="tx-name">${esc(t.desc)}</div>
        <div class="tx-meta">
          <span>${fmtDate(t.date)}</span>
          <span class="tx-cat-badge">${t.cat}</span>
        </div>
      </div>
      <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
      <button class="tx-del" onclick="deleteTransaction(${t.id})" title="Delete">✕</button>
    </div>
  `).join('');
}

// BUDGET
function renderBudget() {
  const budgets = { Food:5000, Transport:3000, Entertainment:2000, Shopping:4000, Utilities:2000 };
  const actual  = {};
  transactions.filter(t=>t.type==='expense').forEach(t => actual[t.cat] = (actual[t.cat]||0)+t.amount);

  const wrap = document.getElementById('budgetBars');
  const cats = Object.keys(budgets);
  wrap.innerHTML = cats.map((cat,i) => {
    const spent = actual[cat]||0;
    const pct   = Math.min(100, Math.round((spent/budgets[cat])*100));
    const color = pct>90?'var(--accent2)': pct>60?'var(--accent3)':'var(--accent)';
    return `
      <div class="budget-row">
        <div class="budget-label">${CAT_ICONS[cat]||''} ${cat}</div>
        <div class="budget-bar-wrap">
          <div class="budget-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="budget-pct">${pct}%</div>
      </div>`;
  }).join('');
}

// CHART (canvas pie)
function renderChart() {
  const canvas = document.getElementById('pieChart');
  const ctx    = canvas.getContext('2d');
  const data   = {};
  transactions.filter(t=>t.type==='expense').forEach(t => data[t.cat]=(data[t.cat]||0)+t.amount);
  const cats   = Object.keys(data);
  const total  = Object.values(data).reduce((a,b)=>a+b,0);

  ctx.clearRect(0,0,200,200);

  if (!total) {
    ctx.fillStyle='rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.arc(100,100,80,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.font='13px DM Sans'; ctx.textAlign='center'; ctx.fillText('No expenses',100,105);
    document.getElementById('chartLegend').innerHTML = '<div style="color:var(--muted);font-size:13px">Add expenses to see chart</div>';
    return;
  }

  let start = -Math.PI/2;
  cats.forEach((cat,i) => {
    const slice = (data[cat]/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(100,100);
    ctx.arc(100,100,80,start,start+slice);
    ctx.closePath();
    ctx.fillStyle = CAT_COLORS[i%CAT_COLORS.length];
    ctx.fill();
    start += slice;
  });

  // center hole
  ctx.beginPath(); ctx.arc(100,100,40,0,Math.PI*2);
  ctx.fillStyle='#111520'; ctx.fill();
  ctx.fillStyle='var(--text)'; ctx.font='bold 12px DM Sans'; ctx.textAlign='center';
  ctx.fillText('Spend',100,97); ctx.fillText('Split',100,112);

  document.getElementById('chartLegend').innerHTML = cats.map((cat,i)=>`
    <div class="legend-item">
      <div class="legend-left">
        <div class="legend-dot" style="background:${CAT_COLORS[i%CAT_COLORS.length]}"></div>
        <span style="font-size:13px">${cat}</span>
      </div>
      <span class="legend-amt">${fmt(data[cat])}</span>
    </div>
  `).join('');
}

// GOAL
function renderGoal() {
  const income  = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const saved   = Math.max(0, income - expense);
  const pct     = savingsGoal > 0 ? Math.min(100, Math.round((saved/savingsGoal)*100)) : 0;

  document.getElementById('goalFill').style.width = pct+'%';
  document.getElementById('goalSaved').textContent = `${fmt(saved)} saved (${pct}%)`;
  document.getElementById('goalTarget').textContent = `Goal: ${fmt(savingsGoal)}`;
}

function setGoal() {
  const v = parseFloat(document.getElementById('goalInput').value);
  if (!v||v<=0) { toast('Enter a valid goal','error'); return; }
  savingsGoal = v;
  localStorage.setItem('finflow_goal', v);
  renderGoal();
  toast('🎯 Savings goal set!','success');
  document.getElementById('goalInput').value='';
}

// UPDATE FILTER DROPDOWN
function updateFilter() {
  const sel  = document.getElementById('filterCat');
  const prev = sel.value;
  const cats = [...new Set(transactions.map(t=>t.cat))];
  sel.innerHTML = '<option value="all">All</option><option value="income">Income only</option><option value="expense">Expenses only</option>' +
    cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  sel.value = prev;
}

// ────────── HELPERS ──────────
function fmt(n) {
  return '₹' + Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:0, maximumFractionDigits:2});
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className='toast', 2600);
}
</script>
